<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Tracker Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">💰 Expense Tracker Pro</h2>

<div class="card p-3 mb-4">
<div class="row g-2">

<div class="col-md-3">
<input type="text" id="desc" class="form-control" placeholder="Description">
</div>

<div class="col-md-2">
<input type="number" id="amount" class="form-control" placeholder="Amount">
</div>

<div class="col-md-2">
<input type="date" id="date" class="form-control">
</div>

<div class="col-md-2">
<select id="category" class="form-control">
<option>Food</option>
<option>Travel</option>
<option>Bills</option>
<option>Shopping</option>
<option>Other</option>
</select>
</div>

<div class="col-md-3">
<button id="addBtn" class="btn btn-primary w-100">Add Expense</button>
</div>

</div>
</div>

<div class="text-center mb-3">
<button class="btn btn-outline-primary filter" data-type="all">All</button>
<button class="btn btn-outline-success filter" data-type="daily">Daily</button>
<button class="btn btn-outline-warning filter" data-type="weekly">Weekly</button>
<button class="btn btn-outline-danger filter" data-type="monthly">Monthly</button>
<button class="btn btn-outline-dark filter" data-type="yearly">Yearly</button>
</div>

<div class="row mb-4 text-center">
<div class="col-md-4 offset-md-4">
<div class="card p-3">
<h5>Total Expense</h5>
<h3 id="total">₹0</h3>
</div>
</div>
</div>

<div class="card p-3 mb-4">
<table class="table table-bordered">
<thead>
<tr>
<th>Description</th>
<th>Amount</th>
<th>Date</th>
<th>Category</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="row">
<div class="col-md-6">
<canvas id="pieChart"></canvas>
</div>
<div class="col-md-6">
<canvas id="barChart"></canvas>
</div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
