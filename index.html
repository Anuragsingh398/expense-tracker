<!DOCTYPE html>
<html lang="en">
<head>
    <title>Expense Tracker Pro</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container py-5">
    <div class="card shadow-lg p-4 main-card">
        <h2 class="text-center mb-4">
            <i class="fa-solid fa-wallet"></i> Expense Tracker
        </h2>
        <div class="row g-2">
            <div class="col-md-4">
                <input type="text" id="desc" class="form-control" placeholder="Description">
            </div>
            <div class="col-md-3">
                <input type="number" id="amount" class="form-control" placeholder="Amount (+income / -expense)">
            </div>
            <div class="col-md-3">
                <select id="category" class="form-control">
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="col-md-2">
                <button id="addBtn" class="btn btn-primary w-100">
                    <i class="fa fa-plus"></i>
                </button>
            </div>
        </div>
        <div class="mt-3">
            <select id="filter" class="form-control">
                <option value="All">All</option>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="d-flex justify-content-between mt-4">
            <div class="summary income">
                Income ₹ <span id="income">0</span>
            </div>
            <div class="summary expense">
                Expense ₹ <span id="expense">0</span>
            </div>
        </div>
        <ul id="list" class="list-group mt-4"></ul>
        <h4 class="text-center mt-3">
            Balance ₹ <span id="total">0</span>
        </h4>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
